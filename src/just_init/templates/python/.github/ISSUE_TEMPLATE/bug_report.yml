name: Bug report
description: Report a reproducible defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Explain the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps, code, and environment details.
    validations:
      required: true
